version: "3.9"

services:
  # ─── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-test-secret-key-for-ci}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ─── Robot Framework (Backend API Tests) ───────────────────────
  robot:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ./backend:/workspace
      - ./backend/tests/robot/results:/workspace/tests/robot/results
    environment:
      BASE_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    command: >
      bash -c "
        pip install --quiet robotframework robotframework-requests robotframework-jsonlibrary &&
        robot
          --outputdir tests/robot/results
          --output output.xml
          --log log.html
          --report report.html
          tests/robot/
      "

  # ─── Playwright (Frontend E2E Tests) ───────────────────────────
  playwright:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    working_dir: /workspace
    volumes:
      - ./frontend:/workspace
      - ./frontend/playwright-report:/workspace/playwright-report
      - ./frontend/test-results:/workspace/test-results
    environment:
      CI: "true"
      BASE_URL: http://localhost:3000
    command: >
      bash -c "
        npm ci --silent &&
        npx playwright test --reporter=html,list
      "
